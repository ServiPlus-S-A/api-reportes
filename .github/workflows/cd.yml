name: CI/CD Pipeline AWS EC2

on:
  push:
    branches: [ "main" ] # Se ejecuta al hacer push a la rama main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          # 1. Cambiamos el contexto a la carpeta del backend para que Docker encuentre el package.json
          context: ./backend-reportes
          
          # 2. Le indicamos la ruta exacta donde está el Dockerfile
          file: ./backend-reportes/Dockerfile
          
          push: true
          # Aquí usa la variable o el nombre fijo de tu repositorio (ej. serviplus/area_reportes)
          tags: ${{ secrets.DOCKER_USERNAME }}/area_reportes:latest

  deploy:
    needs: build-and-push # Espera a que la imagen se suba correctamente
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: DOCKER_USERNAME
          script: |
            cd ~/deploy
            
            # 1. Asegurar que EC2 tenga la variable de entorno para el docker-compose
            export DOCKER_USERNAME=$DOCKER_USERNAME
            
            # 2. Descargar la imagen más reciente de Docker Hub
            docker pull $DOCKER_USERNAME/area_reportes:latest
            
            # 3. Detener los contenedores actuales y levantarlos con la nueva imagen
            docker compose down
            docker compose up -d
            
            # 4. Limpiar imágenes antiguas (Dangling) para no saturar el almacenamiento de la EC2
            docker image prune -af