name: CI/CD Pipeline AWS EC2

on:
  pull_request:
    branches: [ "main" ] 

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend-reportes

          file: ./backend-reportes/Dockerfile
          
          push: true

          tags: ${{ secrets.DOCKER_USERNAME }}/area_reportes:latest

  deploy:
    needs: build-and-push # Espera a que la imagen se suba correctamente
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copiar docker-compose.prod.yml al EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.prod.yml"
          target: "~/deploy"

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          BACKEND_PORT: ${{ secrets.BACKEND_PORT }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: DOCKER_USERNAME,BACKEND_PORT
          script: |
            cd ~/deploy
            
            # 1. Asegurar que EC2 tenga la variable de entorno para el docker-compose
            export DOCKER_USERNAME=$DOCKER_USERNAME
            export BACKEND_PORT=$BACKEND_PORT
            
            # 2. Descargar la imagen más reciente de Docker Hub
            docker pull $DOCKER_USERNAME/area_reportes:latest
            
            # 3. Detener los contenedores actuales y levantarlos con la nueva imagen
            docker compose -f docker-compose.prod.yml down
            docker compose -f docker-compose.prod.yml up -d
            
            # 4. Limpiar imágenes antiguas
            docker image prune -af
      
      - name: Health check
        if: ${{ !env.ACT }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            for i in {1..6}; do
              curl -sf https://${{ secrets.EC2_HOST }}:${{ secrets.NGINX_PORT }} && echo "Deploy exitoso" && exit 0
              echo "Intento $i fallido, esperando 5s..."
              sleep 5
            done
            echo "Health check falló - posible problema en el deploy"
            exit 1