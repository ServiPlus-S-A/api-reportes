name: CI/CD Pipeline AWS EC2

on:
  push:
    branches: ["main"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend-reportes
          file: ./backend-reportes/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/area_reportes:latest
            ${{ secrets.DOCKER_USERNAME }}/area_reportes:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copiar docker-compose.prod.yml al EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.prod.yml"
          target: "~/deploy"

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          BACKEND_PORT: ${{ secrets.BACKEND_PORT }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: DOCKER_USERNAME,BACKEND_PORT
          script: |
            cd ~/deploy

            export DOCKER_USERNAME=$DOCKER_USERNAME
            export BACKEND_PORT=$BACKEND_PORT

            docker pull $DOCKER_USERNAME/area_reportes:latest
            docker compose -f docker-compose.prod.yml down --remove-orphans || true
            docker compose -f docker-compose.prod.yml up -d

            sleep 20

      - name: Health check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            for i in {1..6}; do
              curl -f http://localhost:${{ secrets.BACKEND_PORT }}/health && echo "backend-reportes UP" && exit 0
              echo "Intento $i fallido, esperando 5s..."
              sleep 5
            done
            echo "Health check falló - posible problema en el deploy"
            exit 1
