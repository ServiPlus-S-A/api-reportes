version: '3.8'

services:
  redis:
    image: redis:7.2.5-alpine
    container_name: redis_cache
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    ports:
      - "6379:6379"
    networks:
      - serviplus_net

  api-gateway:
    build:
      context: ./api-gateway
    container_name: api_gateway
    ports:
      - "${GATEWAY_PORT}:${GATEWAY_PORT}"
    environment:
      - PORT=${GATEWAY_PORT}
      - BACKEND_URL=http://backend-reportes:${BACKEND_PORT}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      backend-reportes:
        condition: service_healthy
    networks:
      - serviplus_net

  backend-reportes:
    build:
      context: ./backend-reportes
    container_name: backend_reportes
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    environment:
      - PORT=${BACKEND_PORT}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:${BACKEND_PORT}/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - serviplus_net

  frontend:
    build:
      context: ./frontend
    container_name: frontend_app
    ports:
      - "${FRONTEND_PORT}:${FRONTEND_PORT}"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:${GATEWAY_PORT}
    depends_on:
      api-gateway:
        condition: service_started
    networks:
      - serviplus_net

networks:
  serviplus_net:
    driver: bridge
