services:
  redis:
    image: redis:7.2.5-alpine
    container_name: redis_cache
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    ports:
      - "${REDIS_PORT}:6379"
    networks:
      - serviplus_net

  backend-reportes:
    build:
      context: ./backend-reportes
    container_name: backend_reportes
    env_file:
      - .env
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - PORT=${BACKEND_PORT}
      - REDIS_HOST=redis
      - REDIS_PORT=${REDIS_PORT}
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
      - FIREBASE_CLIENT_EMAIL=${FIREBASE_CLIENT_EMAIL}
      - FIREBASE_PRIVATE_KEY=${FIREBASE_PRIVATE_KEY}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:${BACKEND_PORT}/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    volumes:
      - ./backend-reportes/src:/app/src
    networks:
      - serviplus_net

  frontend:
    build:
      context: ./frontend
    container_name: frontend_app
    env_file:
      - .env
    ports:
      - "${FRONTEND_PORT}:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    networks:
      - serviplus_net

networks:
  serviplus_net:
    driver: bridge
